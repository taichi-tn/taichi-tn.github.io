<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chat Archive</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* 全体のコンテナ：幅を画面の0.6（60%）に設定 */
        .chat-container {
            width: 60%;
            min-width: 400px; /* 狭くなりすぎないよう調整 */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 共通のメッセージスタイル */
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 14px; /* PCで見やすい標準サイズ */
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        /* 相手のトーク（左側・灰色） */
        .message.receive {
            align-self: flex-start;
            background-color: #e4e6eb;
            color: #050505;
            border-bottom-left-radius: 4px;
        }

        /* 自分のトーク（右側・緑色） */
        .message.send {
            align-self: flex-end;
            background-color: #dcf8c6; /* LINE風の薄い緑 */
            color: #000;
            border-bottom-right-radius: 4px;
        }

        /* 時刻表示（お好みで追加） */
        .time {
            font-size: 11px;
            color: #65676b;
            margin-top: 4px;
            display: block;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="message receive">
        お疲れ様です！例の件、どうなりましたか？
        <span class="time">10:00</span>
    </div>

    <div class="message send">
        今HTMLでまとめてるところだよ。画面幅の0.6くらいで表示されるようにしてみた！
        <span class="time">10:05</span>
    </div>

    <div class="message send">
        PCで見ても文字が大きすぎないから、読みやすいと思う。
        <span class="time">10:06</span>
    </div>

    <div class="message receive">
        いいですね！これならスクロールして過去のログも追いやすそうです。
        <span class="time">10:10</span>
    </div>
</div>

</body>
</html>
