<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title></title>
    <script>
        window.onload = function() {
            const ref = document.referrer;
            if (ref && ref !== window.location.href) {
                window.location.href = ref;
            } else {
                console.log("戻る先の履歴がありません。");
            }
        };
    </script>
</head>
<body>
    <p>前のページに戻っています。</p>
</body>
</html>
